name: Java Build with Gradle

on: 
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with: 
          java-version: '21'
          distribution: 'corretto'
          cache: 'gradle'
      - name: Change wrapper permissions
        run: chmod +x ./gradlew
      - name: Build with Gradle Wrapper
        run: ./gradlew build 
    
  
